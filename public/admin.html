<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumsel Merchants - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        // RBAC Guard — runs before page renders
        (function() {
            try {
                var user = JSON.parse(localStorage.getItem('dumsel_user'));
                if (!user) { window.location.href = 'login.html'; return; }
                if (user.role !== 'admin') { window.location.href = 'access-denied.html'; return; }
            } catch(e) {
                window.location.href = 'login.html';
            }
        })();
    </script>
</head>
<body>
    <div class="admin-dashboard">
        <div class="sidebar">
            <h3>Admin Panel</h3>
            <div class="admin-user-info" id="admin-user-info"></div>
            <ul>
                <li><a href="#dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#products"><i class="fas fa-box"></i> Manage Products</a></li>
                <li><a href="#orders"><i class="fas fa-shopping-bag"></i> Orders</a></li>
                <li><a href="#users"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="index.html"><i class="fas fa-globe"></i> Back to Site</a></li>
                <li><a href="#" onclick="logout()" style="color:#ff6b6b;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h1>Admin Dashboard</h1>
            <section id="dashboard">
                <h2>Overview</h2>
                <p>Welcome to the admin dashboard. Here you can manage products, orders, and users.</p>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem;">
                    <div style="background: #f9f9f9; padding: 1rem; border-radius: 10px; text-align: center;">
                        <h3>Total Products</h3>
                        <p id="total-products">Loading...</p>
                    </div>
                    <div style="background: #f9f9f9; padding: 1rem; border-radius: 10px; text-align: center;">
                        <h3>Total Orders</h3>
                        <p id="total-orders">Loading...</p>
                    </div>
                    <div style="background: #f9f9f9; padding: 1rem; border-radius: 10px; text-align: center;">
                        <h3>Total Users</h3>
                        <p id="total-users">Loading...</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <button id="dark-mode-toggle"><i class="fas fa-moon"></i></button>

    <script src="js/script.js"></script>
</body>
</html>
